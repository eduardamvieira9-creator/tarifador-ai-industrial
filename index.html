<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarifador IA Industrial</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0F172A;
    color:white;
}

header{
    background:#1E293B;
    padding:20px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.3);
}

header h1{
    color:#38BDF8;
}

.dashboard{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    padding:20px;
}

.card{
    background:#1E293B;
    width:220px;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

.card h3{
    color:#38BDF8;
    margin-bottom:10px;
}

.valor{
    font-size:24px;
    font-weight:bold;
    color:#10B981;
}

.chat-container{
    max-width:900px;
    margin:20px auto;
    background:#1E293B;
    border-radius:15px;
    overflow:hidden;
}

.chat-header{
    background:#2563EB;
    padding:15px;
    font-weight:bold;
}

.chat-box{
    height:400px;
    overflow-y:auto;
    padding:20px;
}

.bot{
    background:#2563EB;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
}

.user{
    background:#10B981;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
    text-align:right;
}

.input-area{
    display:flex;
    padding:15px;
    gap:10px;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
}

button{
    background:#10B981;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

</style>
</head>
<body>

<header>
    <h1>⚡ Tarifador IA Industrial</h1>
    <p>Gestão Inteligente de Energia e Tarifação</p>
</header>

<section class="dashboard">

    <div class="card">
        <h3>Tarifa Atual</h3>
        <div class="valor">R$ 0,80/min</div>
    </div>

    <div class="card">
        <h3>Horário</h3>
        <div class="valor">PONTA</div>
    </div>

    <div class="card">
        <h3>Economia</h3>
        <div class="valor">30%</div>
    </div>

</section>

<div class="chat-container">

    <div class="chat-header">
        Assistente Inteligente de Tarifação
    </div>

    <div class="chat-box" id="chat">

        <div class="bot">
            Olá! Sou o assistente energético.
            Informe o equipamento e o tempo de utilização.
        </div>

    </div>

    <div class="input-area">
        <input
            type="text"
            id="mensagem"
            placeholder="Ex: Quero usar uma esteira por 30 minutos">
        <button onclick="enviar()">Enviar</button>
    </div>

</div>

<script>

function enviar(){

    let campo = document.getElementById("mensagem");
    let texto = campo.value;

    if(texto === "") return;

    let chat = document.getElementById("chat");

    chat.innerHTML += `
        <div class="user">${texto}</div>
    `;

    let resposta = `
        Equipamento identificado.

        Horário atual: 18h

        Tarifa de pico detectada.

        Tempo solicitado: 30 minutos

        Valor estimado: R$ 10,00

        Deseja:
        ✔ Gerar PIX
        ✔ Agendar para 21h com desconto?
    `;

    setTimeout(() => {

        chat.innerHTML += `
            <div class="bot">${resposta}</div>
        `;

        chat.scrollTop = chat.scrollHeight;

    },1000);

    campo.value = "";
}

</script>

</body>
</html>
